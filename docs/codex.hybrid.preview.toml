# ============================================================
# Native stdio MCPs (clean tool names: server: <name>, tool: <name>)
# ============================================================

[mcp_servers.kg]
command = "/Users/mac/.config/muxcp/bin/run-kg-hub.sh"
# Validated 2026-05-21: kg.kg_stats returned {entities:2734, edges:6407, episodes:1328}

[mcp_servers.seq]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
# Validated 2026-05-21: seq.sequentialthinking returned valid thought result

[mcp_servers.pw]
command = "npx"
args = ["-y", "@playwright/mcp"]
# Untested in Phase 1 ephemeral, but stdio transport same as kg/seq — expected to work

# ============================================================
# muxcp fallback (协议适配兜底层 for classical SSE / legacy MCPs)
# ============================================================
# Codex native `url=` 走 streamable_http；Aliyun MCP 只懂经典 SSE。
# Protocol mismatch confirmed 2026-05-21 (Aliyun returns "Method Not Allowed").
# muxcp 在内部做协议适配——这是它长期保留的核心价值，不是即将淘汰的层。

[mcp_servers.muxcp_fallback]
command = "/Users/mac/.local/bin/muxcp"
args = ["-config", "/Users/mac/.config/muxcp/aliyun-only.yaml"]

# Required prerequisite: create /Users/mac/.config/muxcp/aliyun-only.yaml
# with the following content (this is the "精简版 muxcp_fallback"):
#
# ```yaml
# # Slim muxcp config — only SSE/legacy servers that need protocol adaptation
# transport: stdio
# servers:
#   - name: aliyun_observability
#     transport: sse
#     url: "http://192.168.10.113:18081/sse"
# ```
#
# Result: Codex sees `muxcp_fallback__aliyun_observability__*` for SLS/ARMS/CMS tools.
# Still long-named (this is the price of fallback), but limited to aliyun only.
# Future: when SSE bridge or streamable_http endpoint exists (Phase 3),
#         this entry can be replaced with direct [mcp_servers.obs].

